<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Inventario de Herramientas</title>
    <script type="module">
      import { supabase } from "./js/supabaseClient.js";
      const {
        data: { session },
      } = await supabase.auth.getSession();
      if (!session) window.location.replace("./login.html");
    </script>
    <link rel="stylesheet" href="./styles.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
  </head>
  <body>
    <h1>Inventario de elementos de medición</h1>
    <nav class="nav-btn">
      <button type="button" id="logoutBtn">Cerrar sesión</button>
    </nav>

    <form id="toolForm">
      <input
        type="text"
        id="name"
        placeholder="Nombre de la herramienta"
        required
      />
      <input type="text" id="category" placeholder="Categoría" required />
      <input type="text" id="codigo" placeholder="Código" />

      <input type="text" id="day" placeholder="Fecha" min="1" required />
      <input type="text" id="ubication" placeholder="Ubicación" required />
      <button type="submit">Agregar</button>
      <button type="button" id="cancelEdit" hidden>Cancelar</button>
    </form>
    <input
      type="text"
      id="searchInput"
      placeholder="Buscar instrumento por nombre..."
    />
    <div class="top-bar">
      <div class="download-actions">
        <button type="button" id="downloadToolsBtn">Descargar CSV</button>
        <button type="button" id="downloadWordBtn">Descargar Word</button>
      </div>
    </div>
    <table>
      <thead>
        <tr>
          <th>Nombre</th>
          <th>Categoría</th>
          <th>Código</th>
          <th>Fecha</th>
          <th>Ubicación</th>
          <th>Editar o borrar</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>

    <script type="module" src="./js/main.js"></script>
  </body>
</html>
