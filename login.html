<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Iniciar sesión</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Syne:wght@700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #f2f2f2;
        --surface: #fff;
        --border: #007bff;
        --accent: #3b82f6;
        --accent-hover: #2563eb;
        --text: #111827;
        --muted: #6b7280;
        --error: #ef4444;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: Arial, Helvetica, sans-serif;
        background-color: var(--bg);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        position: relative;
      }

      /* Fondo decorativo */
      body::before {
        content: "";
        position: fixed;
        width: 600px;
        height: 600px;
        background: radial-gradient(
          circle,
          rgba(59, 130, 246, 0.12) 0%,
          transparent 70%
        );
        top: -100px;
        left: -100px;
        pointer-events: none;
      }
      body::after {
        content: "";
        position: fixed;
        width: 400px;
        height: 400px;
        background: radial-gradient(
          circle,
          rgba(99, 102, 241, 0.1) 0%,
          transparent 70%
        );
        bottom: -80px;
        right: -80px;
        pointer-events: none;
      }

      .card {
        background: var(--surface);
        border: 2px solid var(--border);
        border-radius: 16px;
        padding: 48px 40px;
        width: 100%;
        max-width: 400px;
        position: relative;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        animation: slideUp 0.4s ease both;
      }

      @keyframes slideUp {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 32px;
      }

      .brand-icon {
        width: 36px;
        height: 36px;
        background: var(--accent);
        border-radius: 8px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 18px;
      }

      .brand-name {
        font-family: Arial, Helvetica, sans-serif;
        font-size: 18px;
        color: var(--text);
        letter-spacing: 0.02em;
      }

      h1 {
        font-family: Arial, Helvetica, sans-serif;
        color: var(--text);
        font-size: 24px;
        margin-bottom: 6px;
      }

      .subtitle {
        color: var(--muted);
        font-size: 14px;
        margin-bottom: 32px;
      }

      .field {
        margin-bottom: 20px;
      }

      label {
        display: block;
        color: var(--text);
        font-size: 13px;
        font-weight: 500;
        margin-bottom: 8px;
        letter-spacing: 0.02em;
      }

      input[type="email"],
      input[type="password"] {
        width: 100%;
        background: var(--bg);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 12px 14px;
        color: var(--text);
        font-family: Arial, Helvetica, sans-serif;
        font-size: 15px;
        outline: none;
        transition: border-color 0.2s;
      }

      input:focus {
        border-color: var(--accent);
        box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
      }

      input::placeholder {
        color: var(--muted);
      }

      .btn-login {
        width: 100%;
        padding: 13px;
        background: var(--accent);
        color: white;
        border: none;
        border-radius: 8px;
        font-family: Arial, Helvetica, sans-serif;
        font-size: 15px;
        font-weight: 600;
        cursor: pointer;
        transition:
          background 0.2s,
          transform 0.1s;
        margin-top: 8px;
      }

      .btn-login:hover {
        background: var(--accent-hover);
      }

      .btn-login:active {
        transform: scale(0.98);
      }

      .btn-login:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }

      .error-msg {
        display: none;
        background: rgba(239, 68, 68, 0.1);
        border: 1px solid rgba(239, 68, 68, 0.3);
        color: var(--error);
        border-radius: 8px;
        padding: 10px 14px;
        font-size: 13px;
        margin-bottom: 16px;
        animation: shake 0.3s ease;
      }

      .error-msg.visible {
        display: block;
      }

      @keyframes shake {
        0%,
        100% {
          transform: translateX(0);
        }
        25% {
          transform: translateX(-6px);
        }
        75% {
          transform: translateX(6px);
        }
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="brand">
        <div class="brand-icon">🔧</div>
        <span class="brand-name">Inventario</span>
      </div>

      <h1>Bienvenido</h1>
      <p class="subtitle">Ingresá tus datos</p>

      <div class="error-msg" id="errorMsg"></div>

      <div class="field">
        <label for="email">Email</label>
        <input
          type="email"
          id="email"
          placeholder="usuario@empresa.com"
          autocomplete="email"
        />
      </div>
      <div class="field">
        <label for="password">Contraseña</label>
        <div
          style="
            display: flex;
            align-items: center;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 0 12px 0 0;
            transition:
              box-shadow 0.2s,
              border-color 0.2s;
          "
          id="passwordWrapper"
        >
          <input
            type="password"
            id="password"
            placeholder="••••••••"
            autocomplete="current-password"
            style="
              flex: 1;
              border: none;
              background: transparent;
              outline: none;
              box-shadow: none;
              padding: 12px 14px;
              font-size: 15px;
              color: var(--text);
            "
          />
          <button
            type="button"
            id="togglePassword"
            aria-label="Mostrar contraseña"
            style="
              background: none;
              border: none;
              padding: 0;
              margin: 0;
              cursor: pointer;
              color: var(--muted);
              display: flex;
              align-items: center;
              width: auto;
              flex-shrink: 0;
            "
          >
            <svg
              id="eyeIcon"
              xmlns="http://www.w3.org/2000/svg"
              width="18"
              height="18"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
              <circle cx="12" cy="12" r="3" />
            </svg>
          </button>
        </div>
      </div>

      <button class="btn-login" id="loginBtn">Iniciar sesión</button>
    </div>

    <script type="module">
      import { supabase } from "./js/supabaseClient.js";

      const emailInput = document.getElementById("email");
      const passwordInput = document.getElementById("password");
      const loginBtn = document.getElementById("loginBtn");
      const errorMsg = document.getElementById("errorMsg");
      const togglePassword = document.getElementById("togglePassword");
      const eyeIcon = document.getElementById("eyeIcon");
      const passwordWrapper = document.getElementById("passwordWrapper");

      // Si ya hay sesión activa, redirigir directo
      const {
        data: { session },
      } = await supabase.auth.getSession();
      if (session) window.location.href = "./index.html";

      function showError(msg) {
        errorMsg.textContent = msg;
        errorMsg.classList.add("visible");
        // Reiniciar animación
        errorMsg.style.animation = "none";
        errorMsg.offsetHeight;
        errorMsg.style.animation = "";
      }

      loginBtn.addEventListener("click", async () => {
        const email = emailInput.value.trim();
        const password = passwordInput.value;

        if (!email || !password) {
          showError("Completá todos los campos.");
          return;
        }

        loginBtn.disabled = true;
        loginBtn.textContent = "Ingresando...";
        errorMsg.classList.remove("visible");

        const { error } = await supabase.auth.signInWithPassword({
          email,
          password,
        });

        if (error) {
          showError("Email o contraseña incorrectos.");
          loginBtn.disabled = false;
          loginBtn.textContent = "Iniciar sesión";
        } else {
          window.location.href = "./index.html";
        }
      });

      // Login con Enter
      passwordInput.addEventListener("keydown", (e) => {
        if (e.key === "Enter") loginBtn.click();
      });

      passwordInput.addEventListener("focus", () => {
        passwordWrapper.style.borderColor = "var(--accent)";
        passwordWrapper.style.boxShadow = "0 0 0 3px rgba(59, 130, 246, 0.1)";
      });
      passwordInput.addEventListener("blur", () => {
        passwordWrapper.style.borderColor = "var(--border)";
        passwordWrapper.style.boxShadow = "none";
      });

      togglePassword.addEventListener("click", () => {
        const isPassword = passwordInput.type === "password";
        passwordInput.type = isPassword ? "text" : "password";
        eyeIcon.innerHTML = isPassword
          ? `<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
       <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
       <line x1="1" y1="1" x2="23" y2="23"/>`
          : `<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>`;
      });
    </script>
  </body>
</html>
